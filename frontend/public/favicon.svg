<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#6366f1" />
  <!-- Clock face -->
  <circle cx="16" cy="16" r="11" fill="white" />
  <!-- Hour markers -->
  <line x1="16" y1="7" x2="16" y2="9" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="25" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="9" y2="16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="25" y2="16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="16" y1="16" x2="12" y2="11" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="16" y1="16" x2="20" y2="11" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#6366f1" />
</svg>
